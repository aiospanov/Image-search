services:
  - type: web
    name: image-search
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MOCK
        value: true
      - key: MOCK_DATA_PATH
        value: mock_data/products.json
